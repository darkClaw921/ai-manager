    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Что такое AI Lead Manager?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AI Lead Manager — это AI-менеджер по продажам, который автоматически квалифицирует входящие заявки через Telegram-ботов и веб-виджеты. Система использует искусственный интеллект для ведения диалогов по вашим скриптам продаж, оценивает интерес клиентов и записывает квалифицированных лидов на консультации."
          }
        },
        {
          "@type": "Question",
          "name": "Как работает AI-квалификация лидов?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AI ведёт диалог с клиентом по настроенным этапам квалификации: выявляет потребности, уточняет бюджет, сроки и лицо, принимающее решение. На каждом этапе система присваивает баллы и автоматически рассчитывает Interest Score от 0 до 100. Квалифицированные лиды передаются менеджерам."
          }
        },
        {
          "@type": "Question",
          "name": "Какие каналы поддерживаются?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Telegram-боты (webhook и long-polling режимы) и веб-виджеты для сайтов. Можно подключить неограниченное количество каналов, каждый со своими скриптами квалификации."
          }
        },
        {
          "@type": "Question",
          "name": "Сколько стоит AI Lead Manager?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Вы можете начать бесплатно. Оплачиваются только API-запросы к LLM-провайдерам (Anthropic Claude, OpenAI, OpenRouter) по их тарифам. Платформа сама не взимает абонентской платы."
          }
        },
        {
          "@type": "Question",
          "name": "Как быстро можно запустить AI Lead Manager?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Настройка занимает менее 5 минут: зарегистрируйтесь, подключите Telegram-бота или веб-виджет, загрузите скрипты продаж — и AI начнёт обрабатывать заявки автоматически."
          }
        }
