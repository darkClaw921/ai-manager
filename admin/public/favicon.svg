<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1677ff"/>
      <stop offset="100%" stop-color="#0958d9"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e6f0ff" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Chat bubble body -->
  <rect x="96" y="88" width="320" height="240" rx="40" fill="url(#spark)"/>
  <!-- Chat bubble tail -->
  <polygon points="160,328 200,328 140,388" fill="url(#spark)"/>
  <!-- Three neural-dot / signal lines inside bubble -->
  <circle cx="192" cy="188" r="16" fill="#1677ff"/>
  <circle cx="256" cy="188" r="16" fill="#1677ff"/>
  <circle cx="320" cy="188" r="16" fill="#1677ff"/>
  <!-- AI sparkle / star accent -->
  <path d="M256 240 L262 258 L280 264 L262 270 L256 288 L250 270 L232 264 L250 258 Z" fill="#0958d9"/>
  <!-- Score bar at bottom -->
  <rect x="136" y="408" width="240" height="24" rx="12" fill="rgba(255,255,255,0.25)"/>
  <rect x="136" y="408" width="180" height="24" rx="12" fill="rgba(255,255,255,0.85)"/>
</svg>
